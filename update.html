<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undergoing Maintaince</title>
    <style>
        :root {
            --glitch-color: #ff0000;
        }

        body, html {
            height: 100%;
            margin: 0;
            background-color: #050000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        
        .shutter {
            position: fixed;
            left: 0;
            width: 100%;
            height: 50vh;
            background: #000;
            z-index: 100;
        }
        .shutter.top { top: 0; animation: slideUp 1.2s cubic-bezier(0.7, 0, 0.3, 1) forwards; }
        .shutter.bottom { bottom: 0; animation: slideDown 1.2s cubic-bezier(0.7, 0, 0.3, 1) forwards; }

        @keyframes slideUp { 100% { transform: translateY(-100%); } }
        @keyframes slideDown { 100% { transform: translateY(100%); } }

        
        .glitch-wrapper {
            position: relative;
            padding: 20px;
            animation: textReveal 1.5s ease-out forwards;
        }

        
        .glitch {
            position: relative;
            color: var(--glitch-color);
            font-size: 3rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-align: center;
            text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75),
                        -0.025em -0.05em 0 rgba(255, 0, 0, 0.75),
                        0.025em 0.05em 0 rgba(255, 0, 0, 0.75);
            animation: glitch 500ms infinite, jitter 2s infinite;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050000;
        }

        .glitch::before {
            left: 2px;
            text-shadow: -2px 0 #4b0000;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }

        .glitch::after {
            left: -2px;
            text-shadow: -2px 0 #ff0000, 2px 2px #5f0000;
            animation: glitch-anim2 1s infinite linear alternate-reverse;
            clip: rect(10px, 450px, 30px, 0);
        }

        
        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 #f00, -0.05em -0.025em 0 #500; }
            14% { text-shadow: 0.05em 0 0 #f00, -0.05em -0.025em 0 #500; }
            15% { text-shadow: -0.05em -0.025em 0 #f00, 0.025em 0.025em 0 #500; }
            49% { text-shadow: -0.05em -0.025em 0 #f00, 0.025em 0.025em 0 #500; }
            50% { text-shadow: 0.025em 0.05em 0 #f00, 0.05em 0 0 #500; }
            99% { text-shadow: 0.025em 0.05em 0 #f00, 0.05em 0 0 #500; }
            100% { text-shadow: -0.025em 0 0 #f00, -0.025em -0.025em 0 #500; }
        }

        @keyframes glitch-anim {
            0% { clip: rect(31px, 9999px, 94px, 0); }
            20% { clip: rect(62px, 9999px, 42px, 0); }
            40% { clip: rect(16px, 9999px, 78px, 0); }
            60% { clip: rect(87px, 9999px, 12px, 0); }
            80% { clip: rect(43px, 9999px, 55px, 0); }
            100% { clip: rect(90px, 9999px, 5px, 0); }
        }

        @keyframes glitch-anim2 {
            0% { clip: rect(65px, 9999px, 100px, 0); }
            20% { clip: rect(10px, 9999px, 50px, 0); }
            40% { clip: rect(80px, 9999px, 90px, 0); }
            60% { clip: rect(20px, 9999px, 30px, 0); }
            80% { clip: rect(40px, 9999px, 60px, 0); }
            100% { clip: rect(0px, 9999px, 15px, 0); }
        }

        @keyframes jitter {
            0% { transform: translate(0,0); }
            10% { transform: translate(-1px, -1px); }
            20% { transform: translate(1px, 1px); }
            30% { transform: translate(-1px, 1px); }
            40% { transform: translate(1px, -1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(0,0); }
        }

        @keyframes textReveal {
            0% { opacity: 0; transform: scale(1.2); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0px); }
        }

        
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%);
            background-size: 100% 4px;
            z-index: 10;
            pointer-events: none;
        }

        .noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/Noise_generated_by_a_digital_camera_sensor.png');
            opacity: 0.05;
            z-index: 9;
            pointer-events: none;
            animation: grain 0.5s steps(1) infinite;
        }

        @keyframes grain {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-5%, -5%); }
            30% { transform: translate(5%, 5%); }
            50% { transform: translate(-5%, 5%); }
            70% { transform: translate(5%, -5%); }
        }
    </style>
</head>
<body>

    <div class="shutter top"></div>
    <div class="shutter bottom"></div>
    <div class="scanlines"></div>
    <div class="noise"></div>
    
    <div class="glitch-wrapper">
        <div class="glitch" data-text="This site is undergoing maintenance -Bac">
            This site is undergoing maintenance -Bac
        </div>
    </div>

</body>
</html>
